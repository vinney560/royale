{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Page Loader</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #070a0c;
            color: #e4edf2;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            padding: 3rem 2rem;
            text-align: center;
            background: rgba(8, 16, 20, 0.8);
            border-radius: 1.5rem;
            border: 1px solid rgba(60, 130, 120, 0.12);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .container h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #5fd0ba, #3ab0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container p {
            color: #9bb0bb;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #5fd0ba, #3ab0a0);
            color: #070a0c;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(95, 208, 186, 0.25);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #e4edf2;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
        }

        .status {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.85rem;
            color: #5a7a85;
        }

        .status .active {
            color: #fbbf24;
        }

        .status .inactive {
            color: #5a7a85;
        }

        .loader-status-text {
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            .container h1 {
                font-size: 2rem;
            }
            .btn {
                padding: 0.6rem 1.5rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Page Loader Test</h1>
        <p>Testing loading.js from static files</p>

        <div class="btn-group">
            <button class="btn btn-primary" id="showLoader">
                <i class="fas fa-spinner"></i> Show Loader (10s)
            </button>
            <button class="btn btn-secondary" id="hideLoader">
                <i class="fas fa-times"></i> Hide Loader
            </button>
            <button class="btn btn-danger" id="simulateNavigation">
                <i class="fas fa-arrow-right"></i> Simulate Navigation
            </button>
        </div>

        <div class="status">
            <div>Status: <span id="loaderStatus" class="inactive">● Inactive</span></div>
            <div class="loader-status-text">
                <span id="timeDisplay">0</span>s elapsed
            </div>
            <div class="loader-status-text" style="color:#5a7a85;font-size:0.7rem;margin-top:0.5rem;">
                <span id="loaderMessage">Waiting for PageLoader...</span>
            </div>
        </div>

        <div style="margin-top:1.5rem;border-top:1px solid rgba(255,255,255,0.04);padding-top:1.5rem;">
            <p style="font-size:0.8rem;color:#5a7a85;">
                <i class="fas fa-info-circle"></i>
                Make sure <strong>/static/js/loading.js</strong> exists.
            </p>
        </div>
    </div>

    <!-- ===== IMPORT loading.js FROM STATIC ===== -->
    <script src="{% static 'js/loading.js' %}"></script>

    <script>
        (function() {

            var showBtn = document.getElementById('showLoader');
            var hideBtn = document.getElementById('hideLoader');
            var navBtn = document.getElementById('simulateNavigation');
            var loaderStatus = document.getElementById('loaderStatus');
            var timeDisplay = document.getElementById('timeDisplay');
            var loaderMessage = document.getElementById('loaderMessage');

            var timerInterval = null;
            var seconds = 0;
            var hideTimeout = null;

            function updateStatus(active, message) {
                if (active) {
                    loaderStatus.textContent = '● Active';
                    loaderStatus.className = 'active';
                    loaderMessage.textContent = message || 'Loading...';
                } else {
                    loaderStatus.textContent = '● Inactive';
                    loaderStatus.className = 'inactive';
                    loaderMessage.textContent = message || 'Ready';
                }
            }

            function startTimer() {
                seconds = 0;
                timeDisplay.textContent = '0';
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(function() {
                    seconds++;
                    timeDisplay.textContent = seconds;
                }, 1000);
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function checkPageLoader() {
                if (window.PageLoader) {
                    console.log('[Test] PageLoader loaded ✓');
                    updateStatus(false, 'PageLoader ready');
                    return true;
                }
                return false;
            }

            // Show Loader for 10 seconds
            showBtn.addEventListener('click', function() {
                if (!checkPageLoader()) {
                    alert('PageLoader not loaded. Make sure /static/js/loading.js exists.');
                    return;
                }

                if (hideTimeout) {
                    clearTimeout(hideTimeout);
                    hideTimeout = null;
                }

                window.PageLoader.show();
                updateStatus(true, 'Loader active (auto-hide in 10s)');
                startTimer();

                hideTimeout = setTimeout(function() {
                    if (window.PageLoader) {
                        window.PageLoader.hide();
                        updateStatus(false, 'Auto-hidden after 10 seconds');
                        stopTimer();
                        hideTimeout = null;
                    }
                }, 10000);
            });

            // Hide Loader manually
            hideBtn.addEventListener('click', function() {
                if (!checkPageLoader()) {
                    alert('PageLoader not loaded.');
                    return;
                }

                if (hideTimeout) {
                    clearTimeout(hideTimeout);
                    hideTimeout = null;
                }
                window.PageLoader.hide();
                updateStatus(false, 'Manually hidden');
                stopTimer();
            });

            // Simulate Navigation
            navBtn.addEventListener('click', function() {
                if (!checkPageLoader()) {
                    alert('PageLoader not loaded.');
                    return;
                }

                if (hideTimeout) {
                    clearTimeout(hideTimeout);
                    hideTimeout = null;
                }

                window.PageLoader.show();
                updateStatus(true, 'Simulating navigation...');
                startTimer();

                setTimeout(function() {
                    if (window.PageLoader) {
                        window.PageLoader.hide();
                        updateStatus(false, 'Navigation complete');
                        stopTimer();
                    }
                }, 2000);
            });

            // Check if PageLoader is available
            setTimeout(function() {
                if (!checkPageLoader()) {
                    loaderMessage.textContent = '⚠️ PageLoader not loaded. Check console.';
                }
            }, 500);

            updateStatus(false, 'Waiting for PageLoader...');

        })();
    </script>

</body>
</html>
